services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadsifter
      POSTGRES_PASSWORD: leadsifter_dev
      POSTGRES_DB: leadsifter
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leadsifter']
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - '5678:5678'
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Dubai
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: leadsifter
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: leadsifter
      DB_POSTGRESDB_PASSWORD: leadsifter_dev
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      META_API_BASE: http://host.docker.internal:8000/mock/facebook
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  leadsifter:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the app connects to the postgres container, not localhost
      DATABASE_URL: postgresql+asyncpg://leadsifter:leadsifter_dev@postgres:5432/leadsifter
      N8N_WEBHOOK_BASE: http://n8n:5678
    depends_on:
      postgres:
        condition: service_healthy
    # Allows the app to call back to the host machine if needed during local dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  n8n_data: